<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700"
     preserveAspectRatio="xMidYMid slice" width="1000" height="700">
  <!-- 장터 수묵 배경 A — 프롤로그·장면1~6·7-1·7-2 공용(장면별 차이는 CSS 연출).

       ★핵심: 이 그림은 한지 위에 그린다. 먹빛으로 가라앉히는 건 CSS가 한다
         (.bg-market{filter:brightness(.26)}). 어두운 바탕에 직접 그리면
         획을 바탕보다 어둡게 만들 수 없어 밝은 획을 쓰게 되고, 밝은 획은
         어두운 바탕에서 연기처럼 발광한다. 수묵은 밝은 종이 + 어두운 먹이다.
         그래서 여기서는 정직하게 그리고, 어둡게 만드는 일은 나중에 한 번.

       기법 = 붓질. 굵기가 변하는 닫힌 path가 곧 형태. 윤곽선 없음.
       여백 = 한지 그대로 남긴 하늘(상단 45%)과 흙바닥(하단 20%).
       색 = 먹 한 가지의 농담뿐. 유채색 0. -->
  <defs>
    <filter color-interpolation-filters="sRGB" id="ink" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.4" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <!-- 담묵 — 물 많은 붓. 번지되 형태는 남는다. -->
    <filter color-interpolation-filters="sRGB" id="wet" x="-18%" y="-18%" width="136%" height="136%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="8" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <!-- 비백 — 마른 붓이 스치며 남기는 흰 결 -->
    <filter color-interpolation-filters="sRGB" id="dry" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8 0.06" numOctaves="2" seed="5" result="g"/>
      <feDisplacementMap in="SourceGraphic" in2="g" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- 한지 — 완전한 백색이 아니라 살짝 얼룩진 종이 -->
    <linearGradient id="hanji" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#f4efe0"/>
      <stop offset=".58" stop-color="#efe7d4"/>
      <stop offset="1"   stop-color="#e4dac2"/>
    </linearGradient>
  </defs>

  <!-- ===== 한지 ===== -->
  <rect width="1000" height="700" fill="url(#hanji)"/>
  <!-- 종이 얼룩 (아주 옅게) -->
  <g filter="url(#wet)" opacity=".05" fill="#3b362e">
    <ellipse cx="240" cy="180" rx="220" ry="120"/>
    <ellipse cx="800" cy="540" rx="240" ry="130"/>
  </g>

  <!-- ===== 여백 구역(y 0~300): 먼 산 담묵 한 획만 ===== -->
  <g filter="url(#wet)" opacity=".16" fill="#3b362e">
    <path d="M-40 262 C110 226 180 254 268 240 C372 222 428 194 520 216
             C608 238 672 220 768 234 C860 248 940 232 1040 246
             L1040 290 C940 276 860 292 768 278 C672 264 608 282 520 260
             C428 238 372 266 268 282 C180 294 110 270 -40 300 Z"/>
  </g>

  <!-- 마른 가지 하나 — 찬바람(3월 초, 잎이 없다). 획 하나로 끝낸다. -->
  <g filter="url(#ink)" opacity=".5" fill="#2f2a22">
    <path d="M117 308 C119 268 121 236 123 206 L129 206 C127 236 125 268 124 308 Z"/>
    <path d="M124 246 C112 236 103 224 97 210 L100 208 C107 222 116 233 126 243 Z"/>
    <path d="M125 238 C138 228 148 219 156 208 L159 211 C151 222 141 232 128 241 Z"/>
    <path d="M123 220 C115 212 110 204 107 196 L109 195 C113 203 118 211 125 218 Z"/>
    <path d="M124 268 C134 262 141 256 147 248 L149 250 C144 258 136 265 126 271 Z"/>
  </g>

  <!-- ===== 주 획: 처마선 — 굵기가 변하며 화면을 가로지른다 ===== -->
  <g filter="url(#ink)" fill="#241f18">
    <!-- 왼쪽 처마: 왼쪽에서 눌러 시작해 오른쪽으로 가늘게 뺀다 -->
    <path d="M-30 330 C60 300 150 292 238 312 C298 326 332 340 360 356
             L354 372 C324 356 292 344 234 330 C148 310 62 316 -30 358 Z"/>
    <!-- 오른쪽 처마: 반대로 오른쪽에서 눌러 시작 -->
    <path d="M642 356 C728 314 828 306 916 328 C972 342 1006 352 1038 366
             L1038 388 C1004 372 970 362 912 348 C828 328 730 336 648 374 Z"/>
    <!-- 가운데 낮은 지붕(뒤편) — 얇게, 끊기듯 -->
    <path d="M398 370 C452 346 528 342 592 360 C612 366 620 370 628 374
             L626 384 C616 378 604 374 588 370 C528 356 454 360 400 380 Z"
          opacity=".62"/>
  </g>
  <!-- 처마 밑 그늘 — 지붕 아래로 먹이 고인다 -->
  <g filter="url(#wet)" opacity=".3" fill="#2a251d">
    <path d="M-30 358 C80 330 190 328 300 350 L360 372 L360 400 L-30 400 Z"/>
    <path d="M648 374 C740 336 850 332 950 352 L1038 388 L1038 404 L648 404 Z"/>
  </g>

  <!-- 처마 기둥 — 세로 획 셋. 가로 획만 있으면 화면이 눕는다. -->
  <g filter="url(#dry)" opacity=".72" fill="#2a251d">
    <path d="M205 348 L212 348 C211 384 210 412 209 438 L203 438 C204 412 204 384 205 348 Z"/>
    <path d="M795 344 L802 344 C801 382 800 410 799 438 L793 438 C794 410 794 382 795 344 Z"/>
    <path d="M469 374 L474 374 C473 398 473 418 472 438 L467 438 C468 418 468 398 469 374 Z" opacity=".55"/>
  </g>

  <!-- ===== 좌판: 가로 획 둘 ===== -->
  <!-- 첫 획 — 굵고 길게. 엿판·떡시루가 놓인 줄. -->
  <g filter="url(#ink)" fill="#1f1a14">
    <path d="M-20 434 C160 426 340 432 520 428 C700 424 860 430 1020 424
             L1020 450 C860 456 700 450 520 454 C340 458 160 452 -20 462 Z"/>
  </g>
  <!-- 둘째 획 — 얇고 끊긴다(비백). 좌판 아래 그늘. -->
  <g filter="url(#dry)" opacity=".4" fill="#2a251d">
    <path d="M40 472 C200 468 360 474 520 470 C680 466 820 472 970 468
             L970 482 C820 486 680 480 520 484 C360 488 200 482 40 486 Z"/>
  </g>
  <!-- 떡시루의 김 — 담묵이 아니라 여백으로. 종이를 비워 김을 만든다. -->
  <g filter="url(#wet)" opacity=".5" fill="#f2ebda">
    <path d="M240 432 C232 408 250 396 244 372 C240 356 254 344 250 326
             L262 326 C266 344 254 356 258 372 C264 396 246 408 254 432 Z"/>
  </g>

  <!-- ===== 군중: 점묵 — 몇 점만. 개인이 보이면 익명이 깨진다. ===== -->
  <!-- 원경(담묵) -->
  <g filter="url(#wet)" opacity=".3" fill="#3b362e">
    <ellipse cx="352" cy="414" rx="9" ry="15"/>
    <ellipse cx="384" cy="418" rx="8" ry="13"/>
    <ellipse cx="576" cy="416" rx="9" ry="14"/>
    <ellipse cx="606" cy="420" rx="7" ry="12"/>
    <ellipse cx="690" cy="414" rx="9" ry="15"/>
  </g>
  <!-- 중경(농묵) — 머리 점 + 몸 획. 어깨에서 아래로 붓을 눌러 뺀다. -->
  <g filter="url(#ink)" opacity=".9" fill="#1c1712">
    <g><ellipse cx="120" cy="438" rx="10" ry="11"/>
       <path d="M120 448 C104 452 100 470 102 516 L138 516 C140 470 136 452 120 448 Z"/></g>
    <g><ellipse cx="322" cy="444" rx="9" ry="10"/>
       <path d="M322 453 C308 457 304 474 306 518 L338 518 C340 474 336 457 322 453 Z"/></g>
    <g><ellipse cx="486" cy="450" rx="9" ry="10"/>
       <path d="M486 459 C473 463 469 480 472 522 L502 522 C504 480 499 463 486 459 Z"/></g>
    <g><ellipse cx="524" cy="474" rx="6" ry="7"/>
       <path d="M524 480 C515 483 513 494 514 522 L534 522 C535 494 533 483 524 480 Z"/></g>
    <g><ellipse cx="678" cy="442" rx="10" ry="11"/>
       <path d="M678 452 C663 456 659 473 661 516 L695 516 C697 473 693 456 678 452 Z"/></g>
    <g><ellipse cx="714" cy="448" rx="9" ry="10"/>
       <path d="M714 457 C701 461 697 478 699 520 L729 520 C731 478 727 461 714 457 Z"/></g>
    <g><ellipse cx="866" cy="440" rx="10" ry="11"/>
       <path d="M866 450 C850 454 846 472 848 516 L884 516 C886 472 882 454 866 450 Z"/></g>
  </g>
  <!-- 근경(가장 짙게) — 양 끝에서 잘린다. 관객이 군중 속에 서 있게. -->
  <g filter="url(#ink)" opacity=".94" fill="#17110b">
    <g><ellipse cx="28" cy="470" rx="19" ry="21"/>
       <path d="M28 490 C-6 496 -14 530 -10 640 L66 640 C70 530 62 496 28 490 Z"/></g>
    <g><ellipse cx="968" cy="464" rx="20" ry="22"/>
       <path d="M968 485 C1004 491 1012 526 1008 640 L928 640 C924 526 932 491 968 485 Z"/></g>
  </g>

  <!-- ===== 하단 여백: 흙바닥 마른 결 한 획 ===== -->
  <g filter="url(#dry)" opacity=".14" fill="#3b362e">
    <path d="M120 598 C320 592 520 602 720 594 C840 590 920 596 990 592
             L990 600 C920 604 840 598 720 602 C520 610 320 600 120 606 Z"/>
  </g>
</svg>
