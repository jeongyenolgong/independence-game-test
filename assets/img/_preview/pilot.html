<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<title>파일럿 — 유관순</title>
<style>
  body{margin:0;background:#efe9dc;font-family:sans-serif;color:#2a2016;}
  h1{text-align:center;font-size:18px;padding:18px 0 4px;}
  p.sub{text-align:center;margin:0 0 18px;color:#6a5c44;font-size:13px;}
  .row{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;padding:10px 20px 40px;}
  .cell{width:300px;text-align:center;}
  .stage{height:520px;border-radius:14px;display:flex;align-items:flex-end;justify-content:center;
         padding-bottom:18px;box-shadow:0 6px 22px rgba(0,0,0,.18);overflow:hidden;position:relative;}
  .ink-bg{background:radial-gradient(120% 80% at 50% 20%, #f6f1e6 0%, #e7dcc6 60%, #d8c9ac 100%);}
  .ink-bg::before{content:"";position:absolute;inset:0;opacity:.5;
      background:radial-gradient(60% 40% at 30% 65%, rgba(90,80,60,.18), transparent 70%),
                 radial-gradient(50% 35% at 72% 60%, rgba(90,80,60,.15), transparent 70%);}
  .stage svg{width:230px;height:auto;position:relative;z-index:1;}
  /* 흑백 = 회색필터 + 무표정 */
  .state-bw svg{filter:grayscale(1) brightness(.97) contrast(1.2);}
  .state-bw .expr-smile{display:none;} .state-bw .expr-neutral{display:inline;}
  /* 색부활 = 금빛 + 미소 */
  .state-color svg{filter:drop-shadow(0 0 10px rgba(214,170,74,.85)) drop-shadow(0 0 22px rgba(214,170,74,.45));}
  .state-color .expr-neutral{display:none;} .state-color .expr-smile{display:inline;}
  .cap{margin-top:12px;font-size:15px;font-weight:700;}
  .cap small{display:block;font-weight:400;color:#6a5c44;margin-top:3px;font-size:12px;}
</style></head><body>
  <h1>유관순 — 목판 화풍 파일럿 v4 (그림 1장 = 흑백/색부활 겸용)</h1>
  <p class="sub">저고리 한 덩어리(겨드랑이 이음·반팔 느낌 제거) · 보따리 갈무리 주름. 그림 파일은 하나입니다.</p>
  <div class="row">
    <div class="cell">
      <div class="stage ink-bg state-bw" data-svg></div>
      <div class="cap">① 목판 흑백 · 무표정 <small>암구호 3인 세트 · 반전 전</small></div>
    </div>
    <div class="cell">
      <div class="stage ink-bg state-color" data-svg></div>
      <div class="cap">② 색부활 · 미소 <small>암구호 정답 · 도감 앞면 · 엔딩</small></div>
    </div>
  </div>
<script>
  fetch('../figures/fig01_yugwansun.svg').then(r=>r.text()).then(svg=>{
    document.querySelectorAll('[data-svg]').forEach(el=>{ el.insertAdjacentHTML('beforeend', svg); });
  });
</script>
</body></html>
