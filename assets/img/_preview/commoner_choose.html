<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<title>R1 평민 디코이 — A/B 선택</title>
<style>
  body{margin:0;background:#efe9dc;font-family:sans-serif;color:#2a2016;}
  h1{text-align:center;font-size:18px;padding:18px 0 4px;}
  p.sub{text-align:center;margin:0 0 18px;color:#6a5c44;font-size:13px;}
  .row{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;padding:10px 20px 40px;}
  .cell{width:300px;text-align:center;}
  .stage{height:540px;border-radius:14px;display:flex;align-items:flex-end;justify-content:center;
         padding-bottom:18px;box-shadow:0 6px 22px rgba(0,0,0,.18);overflow:hidden;position:relative;}
  .ink-bg{background:radial-gradient(120% 80% at 50% 20%, #f6f1e6 0%, #e7dcc6 60%, #d8c9ac 100%);}
  .ink-bg::before{content:"";position:absolute;inset:0;opacity:.5;
      background:radial-gradient(60% 40% at 30% 65%, rgba(90,80,60,.18), transparent 70%),
                 radial-gradient(50% 35% at 72% 60%, rgba(90,80,60,.15), transparent 70%);}
  .stage svg{width:250px;height:auto;position:relative;z-index:1;}
  .state-bw svg{filter:grayscale(1) brightness(.97) contrast(1.2);}
  .cap{margin-top:12px;font-size:15px;font-weight:700;}
  .cap small{display:block;font-weight:400;color:#6a5c44;margin-top:3px;font-size:12px;}
  .ref .stage{opacity:.92;}
  .ref .cap{color:#8a7a5c;}
</style></head><body>
  <h1>R1 평민 디코이 — A안 / B안 (항상 흑백)</h1>
  <p class="sub">옷 톤 반전(어두운 저고리 + 밝은 치마 + 행주치마)으로 유관순과 구분. 오른쪽은 유관순(참고, 흑백).</p>
  <div class="row">
    <div class="cell">
      <div class="stage ink-bg state-bw" data-svg="../crowd/commoner_basketgirl_A.svg"></div>
      <div class="cap">A안 · 광주리 이고 한 손 받침 <small>서 있음</small></div>
    </div>
    <div class="cell">
      <div class="stage ink-bg state-bw" data-svg="../crowd/commoner_basketgirl_B.svg"></div>
      <div class="cap">B안 · 광주리 바닥에 놓고 뒤에 앉음 <small>박수근 노상</small></div>
    </div>
    <div class="cell ref">
      <div class="stage ink-bg state-bw" data-svg="../figures/fig01_yugwansun.svg"></div>
      <div class="cap">유관순 (참고) <small>흰 저고리 + 남색 치마</small></div>
    </div>
  </div>
<script>
  document.querySelectorAll('[data-svg]').forEach(el=>{
    fetch(el.dataset.svg).then(r=>r.text()).then(svg=>el.insertAdjacentHTML('beforeend',svg));
  });
</script>
</body></html>
