<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 470" width="260" height="470">
  <!-- 순사(허리에 군도 찬 일제 순사) : 디코이(위험) — 항상 흑백. 목판 굵은 칼선, 각진 제복·카이젤 수염·각반으로 위압적. -->
  <defs>
    <style>
      .ink {fill:none;stroke:#17110b;stroke-linejoin:round;stroke-linecap:round;}
      .k4{stroke-width:4;} .k6{stroke-width:6;} .k9{stroke-width:9;}
      .hatch{stroke:#17110b;fill:none;stroke-width:2.6;stroke-linecap:round;}
    </style>
  </defs>

  <!-- ===== 군도(왼쪽 허리에서 바깥·아래로 비스듬히) : 맨 뒤 ===== -->
  <path d="M74 236 L86 240 L48 372 L36 366 Z" fill="#6b6f76"/>
  <path class="ink k4" d="M74 236 L86 240 L48 372 L36 366 Z"/>
  <path class="ink k4" d="M80 242 L42 369"/>                  <!-- 칼집 능선 -->
  <ellipse cx="42" cy="369" rx="9" ry="6" fill="#3a3d42" transform="rotate(-20 42 369)"/> <!-- 칼끝 마구리 -->
  <path class="ink k4" d="M34 362 L50 372"/>

  <!-- ===== 다리/바지 ===== -->
  <path d="M100 300 L98 414 L122 414 L124 300 Z" fill="#3a4048"/>
  <path d="M136 300 L138 414 L162 414 L160 300 Z" fill="#3a4048"/>
  <path class="ink k6" d="M100 300 L98 414 L122 414 L124 300"/>
  <path class="ink k6" d="M136 300 L138 414 L162 414 L160 300"/>

  <!-- ===== 각반(게토루, 무릎 아래~발목) ===== -->
  <path d="M97 360 L124 360 L123 410 L98 410 Z" fill="#57544c"/>
  <path d="M136 360 L163 360 L162 410 L137 410 Z" fill="#57544c"/>
  <path class="ink k4" d="M97 360 L124 360 L123 410 L98 410 Z"/>
  <path class="ink k4" d="M136 360 L163 360 L162 410 L137 410 Z"/>
  <path class="hatch" d="M98 370 L123 366"/>                  <!-- 감은 천 사선 -->
  <path class="hatch" d="M98 382 L123 378"/>
  <path class="hatch" d="M98 394 L123 390"/>
  <path class="hatch" d="M137 370 L162 366"/>
  <path class="hatch" d="M137 382 L162 378"/>
  <path class="hatch" d="M137 394 L162 390"/>

  <!-- ===== 구두 ===== -->
  <path d="M90 410 L124 410 L126 430 C126 438 88 438 86 430 Z" fill="#1c1c1e"/>
  <path d="M136 410 L170 410 L172 430 C172 438 134 438 132 430 Z" fill="#1c1c1e"/>
  <path class="ink k6" d="M90 410 L124 410 L126 430 C126 438 88 438 86 430 Z"/>
  <path class="ink k6" d="M136 410 L170 410 L172 430 C172 438 134 438 132 430 Z"/>

  <!-- ===== 목(스탠드칼라 안으로) : 상의보다 먼저 ===== -->
  <path d="M121 104 L119 122 L141 122 L139 104 Z" fill="#ecc8a2"/>

  <!-- ===== 제복 상의(각진 어깨 + 곧은 옆선) ===== -->
  <path d="M116 116 L74 134 L70 154 L72 300 L188 300 L190 154 L186 134 L144 116 Z" fill="#3a4048"/>
  <!-- 팔(옆선으로 구분, 곧게 내려옴) -->
  <path class="ink k6" d="M116 116 L74 134 L70 154 L72 300 L188 300 L190 154 L186 134 L144 116"/>
  <path class="ink k6" d="M94 136 L92 300 M166 136 L168 300"/>   <!-- 소매 옆선 -->
  <!-- 스탠드 칼라 -->
  <path d="M112 116 L112 130 C120 136 140 136 148 130 L148 116 Z" fill="#2a2f36"/>
  <path class="ink k4" d="M112 116 L112 130 C120 136 140 136 148 130 L148 116"/>
  <!-- 견장 -->
  <path d="M74 134 L96 130 L96 140 L74 144 Z" fill="#2a2f36"/>
  <path d="M186 134 L164 130 L164 140 L186 144 Z" fill="#2a2f36"/>
  <path class="ink k4" d="M74 134 L96 130 L96 140 L74 144 Z"/>
  <path class="ink k4" d="M186 134 L164 130 L164 140 L186 144 Z"/>
  <!-- 여밈선 + 단추줄 -->
  <path class="ink k4" d="M130 130 L130 224"/>
  <circle cx="130" cy="150" r="4" fill="#b9a24a"/>
  <circle cx="130" cy="170" r="4" fill="#b9a24a"/>
  <circle cx="130" cy="190" r="4" fill="#b9a24a"/>
  <circle cx="130" cy="210" r="4" fill="#b9a24a"/>
  <!-- 벨트 -->
  <path d="M72 224 L188 224 L186 244 L74 244 Z" fill="#22252a"/>
  <rect x="122" y="227" width="16" height="14" rx="2" fill="#b9a24a"/>
  <path class="ink k6" d="M72 224 L188 224 M74 244 L186 244"/>
  <path class="ink k4" d="M122 227 L138 227 L138 241 L122 241 Z"/>
  <!-- 음영 해칭(양 옆구리) -->
  <path class="hatch" d="M78 180 L90 184"/>
  <path class="hatch" d="M76 194 L88 198"/>
  <path class="hatch" d="M182 180 L170 184"/>
  <path class="hatch" d="M184 194 L172 198"/>

  <!-- ===== 칼자루 + 왼손(벨트 왼쪽, 칼 위에 얹음) ===== -->
  <path d="M74 226 L92 232 L88 248 L70 242 Z" fill="#2a2f36"/>
  <path class="ink k4" d="M74 226 L92 232 L88 248 L70 242 Z"/>
  <path d="M80 232 C68 234 64 246 74 254 C86 260 98 252 94 240 C92 234 86 231 80 232 Z" fill="#ecc8a2"/>
  <path class="ink k4" d="M80 232 C68 234 64 246 74 254 C86 260 98 252 94 240"/>
  <path class="ink k4" d="M82 244 L92 246 M82 250 L92 250"/>  <!-- 손가락 -->

  <!-- ===== 얼굴 ===== -->
  <ellipse cx="130" cy="70" rx="32" ry="24" fill="#ecc8a2"/>
  <path d="M98 68 C98 96 112 112 130 112 C148 112 162 96 162 68 Z" fill="#ecc8a2"/>
  <path class="ink k6" d="M98 66 C98 96 112 112 130 112 C148 112 162 96 162 66"/>

  <!-- ===== 제모(모자) ===== -->
  <path d="M96 56 C96 38 108 28 130 28 C152 28 164 38 164 56 Z" fill="#2a2f36"/>       <!-- 크라운 -->
  <path d="M96 50 L164 50" stroke="#12131a" stroke-width="6"/>                          <!-- 모자 띠 -->
  <circle cx="130" cy="43" r="5" fill="#b9a24a"/>                                        <!-- 모표 -->
  <path d="M90 64 C90 66 170 66 170 64 C178 64 180 58 172 56 L88 56 C80 58 82 64 90 64 Z" fill="#1c1c1e"/> <!-- 챙 -->
  <path class="ink k6" d="M96 56 C96 38 108 28 130 28 C152 28 164 38 164 56"/>
  <path class="ink k6" d="M88 56 L172 56 C180 58 178 65 170 65 L90 65 C80 65 80 58 88 56 Z"/>

  <!-- ===== 표정(위압) ===== -->
  <path class="ink k4" d="M106 74 L124 78"/>     <!-- 치켜뜬 눈썹 -->
  <path class="ink k4" d="M154 74 L136 78"/>
  <path class="ink k4" d="M110 85 L122 85"/>     <!-- 눈 -->
  <path class="ink k4" d="M138 85 L150 85"/>
  <path class="ink k4" d="M129 89 L128 96 L134 96"/>  <!-- 코 -->
  <!-- 카이젤 수염(양끝 올림) -->
  <path d="M130 101 C124 100 116 101 110 100 C104 99 100 94 104 92
           C106 97 116 96 122 98 C126 99 128 100 130 101
           C132 100 134 99 138 98 C144 96 154 97 156 92
           C160 94 156 99 150 100 C144 101 136 100 130 101 Z"
        fill="#17110b"/>
  <path class="ink k4" d="M122 108 L138 108"/>   <!-- 굳은 입 -->
</svg>
