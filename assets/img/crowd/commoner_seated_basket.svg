<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 470" width="260" height="470">
  <!-- B안: 광주리를 바닥에 놓고 그 뒤에 팔짱 끼고 앉은 노상 여인(박수근 노상). 평민 디코이 — 항상 흑백.
       옷=갈물 무명 저고리(어두움)+밝은 무명 치마. 광주리=치마 바닥선에 맞춰 땅에 놓임, 곶감 봉긋. -->
  <defs>
    <style>
      .ink {fill:none;stroke:#17110b;stroke-linejoin:round;stroke-linecap:round;}
      .k4{stroke-width:4;} .k6{stroke-width:6;} .k9{stroke-width:9;}
      .thin{fill:none;stroke:#17110b;stroke-width:2.4;stroke-linecap:round;}
      .hair{fill:#1c140c;}
      .cut{stroke:#efe7d4;fill:none;stroke-width:2.6;stroke-linecap:round;}
      .hatch{stroke:#3a2f1c;fill:none;stroke-width:2.6;stroke-linecap:round;}
      .weave{stroke:#8a713f;fill:none;stroke-width:2.2;stroke-linecap:round;}
    </style>
  </defs>

  <!-- ===== 치마(앉음, 밝은 무명, 바닥에 넓게 퍼짐) ===== -->
  <path d="M98 250 C60 280 44 348 40 422 L220 422 C216 348 200 280 162 250 Z" fill="#d8ccae"/>
  <path class="ink k9" d="M98 250 C60 280 44 348 40 422 L220 422 C216 348 200 280 162 250"/>
  <path class="ink k4" d="M86 306 C76 352 68 394 64 420"/>
  <path class="ink k4" d="M174 306 C184 352 192 394 196 420"/>
  <path class="hatch" d="M72 360 L86 354"/>
  <path class="hatch" d="M76 388 L90 381"/>
  <path class="hatch" d="M188 360 L174 354"/>

  <!-- ===== 목 ===== -->
  <path d="M117 172 L117 210 L143 210 L143 172 Z" fill="#ecc8a2"/>
  <path class="ink k4" d="M117 194 L117 209 M143 194 L143 209"/>

  <!-- ===== 저고리 몸통(앉은 어깨) ===== -->
  <path d="M118 210 L96 212 C80 218 72 236 76 258 L184 258 C188 236 180 218 164 212 L142 210 L130 250 Z" fill="#7f6b48"/>
  <path class="ink k6" d="M118 210 L96 212 C80 218 72 236 76 258 M184 258 C188 236 180 218 164 212 L142 210"/>
  <!-- 깃(진한 갈색) + 목선 살색 + 동정 -->
  <path d="M108 210 L130 250 L152 210 Z" fill="#5c4c30"/>
  <path d="M118 209 L130 240 L142 209 Z" fill="#ecc8a2"/>
  <path d="M118 210 L130 240 L142 210" fill="none" stroke="#e7ddc6" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
  <path class="ink k6" d="M108 210 L130 250 L152 210"/>
  <path class="hatch" d="M78 246 L90 251"/>
  <path class="hatch" d="M182 246 L170 251"/>

  <!-- ===== 팔짱(교차한 두 소매) : 저고리 위 ===== -->
  <!-- 뒤쪽 팔(오른 팔꿈치→왼쪽) -->
  <path d="M182 256 L192 272 L104 298 L94 282 Z" fill="#6f5c3d"/>
  <path class="ink k6" d="M182 256 L192 272 L104 298 L94 282 Z"/>
  <!-- 앞쪽 팔(왼 팔꿈치→오른쪽, 위로 교차) -->
  <path d="M78 256 L68 272 L156 298 L166 282 Z" fill="#7f6b48"/>
  <path class="ink k6" d="M78 256 L68 272 L156 298 L166 282 Z"/>
  <path class="thin" d="M84 268 L150 290"/>

  <!-- ===== 얼굴 / 머리 / 가르마 ===== -->
  <ellipse cx="130" cy="150" rx="35" ry="39" fill="#ecc8a2"/>
  <path class="hair" d="M95 152 C92 118 111 100 130 100 C149 100 168 118 165 152 C155 132 147 124 130 124 C113 124 105 132 95 152 Z"/>
  <ellipse class="ink k6" cx="130" cy="150" rx="35" ry="39"/>
  <path class="ink k6" d="M95 152 C92 118 111 100 130 100 C149 100 168 118 165 152"/>
  <path class="cut" d="M130 102 L130 122"/>

  <!-- 표정(무심한 장사꾼, 단일) -->
  <path class="ink k4" d="M113 146 L125 146"/>
  <path class="ink k4" d="M135 146 L147 146"/>
  <path class="ink k4" d="M127 154 L125 162 L132 162"/>
  <path class="ink k4" d="M121 172 L139 172"/>

  <!-- ===== 광주리(치마 바닥선에 맞춰 땅에 놓임, 곶감 봉긋) : 맨 위 ===== -->
  <path d="M80 366 C82 402 102 418 130 418 C158 418 178 402 180 366 Z" fill="#cdb98a"/>
  <path class="weave" d="M84 380 C104 396 156 396 176 380"/>
  <path class="weave" d="M82 370 C104 384 156 384 178 370"/>
  <path class="weave" d="M104 372 L108 414"/>
  <path class="weave" d="M130 374 L130 418"/>
  <path class="weave" d="M156 372 L152 414"/>
  <!-- 곶감 더미(봉긋, 완전 노출) -->
  <ellipse cx="100" cy="360" rx="15" ry="11" fill="#9c5a34"/>
  <ellipse cx="130" cy="354" rx="16" ry="12" fill="#a9603a"/>
  <ellipse cx="160" cy="360" rx="15" ry="11" fill="#9c5a34"/>
  <ellipse cx="114" cy="366" rx="13" ry="9" fill="#8a4e2c"/>
  <ellipse cx="146" cy="366" rx="13" ry="9" fill="#8a4e2c"/>
  <ellipse cx="130" cy="368" rx="13" ry="9" fill="#7a4527"/>
  <path class="ink k4" d="M80 366 C92 352 114 346 130 346 C146 346 168 352 180 366"/>
  <!-- 바구니 몸체 칼선만 -->
  <path class="ink k6" d="M80 366 C82 402 102 418 130 418 C158 418 178 402 180 366"/>
</svg>
