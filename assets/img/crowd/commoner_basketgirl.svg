<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 470" width="260" height="470">
  <!-- A안: 광주리 머리에 이고 두 손 앞에 모음(서 있음, 광주리는 머리로 균형). 평민 디코이 — 항상 흑백.
       옷=갈물 무명 저고리(어두움, 한 덩어리)+밝은 무명 치마. 광주리=곶감만. -->
  <defs>
    <style>
      .ink {fill:none;stroke:#17110b;stroke-linejoin:round;stroke-linecap:round;}
      .k4{stroke-width:4;} .k6{stroke-width:6;} .k9{stroke-width:9;}
      .thin{fill:none;stroke:#17110b;stroke-width:2.4;stroke-linecap:round;}
      .hair{fill:#1c140c;}
      .cut{stroke:#efe7d4;fill:none;stroke-width:2.6;stroke-linecap:round;}
      .hatch{stroke:#3a2f1c;fill:none;stroke-width:2.6;stroke-linecap:round;}
      .weave{stroke:#8a713f;fill:none;stroke-width:2.2;stroke-linecap:round;}
    </style>
  </defs>

  <!-- ===== 치마(밝은 무명) ===== -->
  <path d="M90 210 C68 236 56 282 50 448 L210 448 C204 282 192 236 170 210 Z" fill="#d8ccae"/>
  <path class="ink k9" d="M90 210 C68 236 56 282 50 448 L210 448 C204 282 192 236 170 210"/>
  <path class="ink k4" d="M96 262 C86 342 78 404 74 446"/>
  <path class="ink k4" d="M130 258 C129 342 129 404 130 446"/>
  <path class="ink k4" d="M164 262 C174 342 182 404 186 446"/>
  <path class="hatch" d="M64 350 L78 344"/>
  <path class="hatch" d="M66 378 L80 371"/>

  <!-- ===== 목 ===== -->
  <path d="M117 138 L117 182 L143 182 L143 138 Z" fill="#ecc8a2"/>
  <path class="ink k4" d="M117 160 L117 181 M143 160 L143 181"/>

  <!-- ===== 저고리(한 덩어리: 어깨~소매~겨드랑이) ===== -->
  <path d="M118 180 L84 180 C58 185 44 208 48 232 C52 252 66 266 88 270
           C104 278 118 280 130 280 C142 280 156 278 172 270
           C194 266 208 252 212 232 C216 208 202 185 176 180
           L142 180 L130 226 Z" fill="#7f6b48"/>
  <!-- 깃(더 진한 갈색) + 목선 살색 + 동정 -->
  <path d="M108 180 L130 224 L152 180 Z" fill="#5c4c30"/>
  <path d="M118 179 L130 212 L142 179 Z" fill="#ecc8a2"/>
  <path d="M118 180 L130 212 L142 180" fill="none" stroke="#e7ddc6" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 저고리 칼선(외곽) -->
  <path class="ink k6" d="M118 180 L84 180 C58 185 44 208 48 232 C52 252 66 266 88 270
           C104 278 118 280 130 280 C142 280 156 278 172 270
           C194 266 208 252 212 232 C216 208 202 185 176 180 L142 180"/>
  <path class="ink k6" d="M108 180 L130 224 L152 180"/>
  <path class="thin" d="M80 198 C66 220 70 250 90 268"/>
  <path class="thin" d="M180 198 C194 220 190 250 170 268"/>
  <path class="hatch" d="M64 220 L76 225"/>
  <path class="hatch" d="M62 230 L74 235"/>
  <path class="hatch" d="M196 220 L184 225"/>
  <path class="hatch" d="M198 230 L186 235"/>

  <!-- ===== 두 손(앞에 가지런히 모음) ===== -->
  <path d="M118 262 C108 260 104 270 110 276 C116 282 128 280 130 272 Z" fill="#e7c39d"/>
  <path d="M142 262 C152 260 156 270 150 276 C144 282 132 280 130 272 Z" fill="#e7c39d"/>
  <path class="ink k4" d="M118 262 C108 260 104 270 110 276 C116 282 128 282 130 272"/>
  <path class="ink k4" d="M142 262 C152 260 156 270 150 276 C144 282 132 282 130 272"/>

  <!-- ===== 얼굴 / 머리 / 가르마 ===== -->
  <ellipse cx="130" cy="116" rx="34" ry="38" fill="#ecc8a2"/>
  <path class="hair" d="M96 118 C93 85 111 68 130 68 C149 68 167 85 164 118 C155 99 147 91 130 91 C113 91 105 99 96 118 Z"/>
  <ellipse class="ink k6" cx="130" cy="116" rx="34" ry="38"/>
  <path class="ink k6" d="M96 118 C93 85 111 68 130 68 C149 68 167 85 164 118"/>
  <path class="cut" d="M130 70 L130 89"/>

  <!-- 표정(무심한 장사꾼, 단일) -->
  <path class="ink k4" d="M114 112 L126 112"/>
  <path class="ink k4" d="M134 112 L146 112"/>
  <path class="ink k4" d="M127 120 L125 128 L132 128"/>
  <path class="ink k4" d="M121 138 L139 138"/>

  <!-- ===== 광주리(머리에 인, 곶감만 수북) ===== -->
  <path d="M70 54 C72 82 98 94 130 94 C162 94 188 82 190 54 Z" fill="#cdb98a"/>
  <path class="weave" d="M80 68 C102 84 158 84 180 68"/>
  <path class="weave" d="M76 60 C102 74 158 74 184 60"/>
  <path class="weave" d="M102 62 L106 90"/>
  <path class="weave" d="M130 64 L130 94"/>
  <path class="weave" d="M158 62 L154 90"/>
  <ellipse cx="100" cy="48" rx="15" ry="12" fill="#9c5a34"/>
  <ellipse cx="130" cy="42" rx="16" ry="13" fill="#a9603a"/>
  <ellipse cx="160" cy="48" rx="15" ry="12" fill="#9c5a34"/>
  <ellipse cx="114" cy="54" rx="13" ry="10" fill="#8a4e2c"/>
  <ellipse cx="146" cy="54" rx="13" ry="10" fill="#8a4e2c"/>
  <ellipse cx="130" cy="56" rx="13" ry="10" fill="#7a4527"/>
  <path class="ink k4" d="M70 54 C82 40 114 34 130 34 C146 34 178 40 190 54"/>
  <path class="ink k6" d="M70 54 C72 82 98 94 130 94 C162 94 188 82 190 54"/>
</svg>
